{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5" data-aos="zoom-in">
        <div class="dash-card p-5">
            <div class="text-center mb-5">
                <i class="bi bi-person-plus display-4 text-accent mb-3"></i>
                <h3 class="fw-bold">Create Profile</h3>
                <p class="text-muted small">Join the GroceryStore platform</p>
            </div>
            
            <form action="{{ url_for('main.signup') }}" method="POST">
                <div class="row g-3">
                    <div class="col-md-12 mb-3">
                        <label class="form-label small text-muted text-uppercase">Full Identity Name</label>
                        <input type="text" name="username" class="form-control bg-dark border-secondary text-white rounded-3" placeholder="John Doe" required>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label small text-muted text-uppercase">Corporate Email</label>
                        <input type="email" name="email" class="form-control bg-dark border-secondary text-white rounded-3" placeholder="name@company.com" required>
                    </div>
                    <div class="col-md-12 mb-4">
                        <label class="form-label small text-muted text-uppercase">Security Pin</label>
                        <input type="password" name="password" class="form-control bg-dark border-secondary text-white rounded-3" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dash py-3">
                        Complete Registration
                    </button>
                    <a href="{{ url_for('main.login') }}" class="btn btn-link btn-sm text-muted text-decoration-none mt-2">
                        Already have an account? <span class="text-accent">Login secure</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
